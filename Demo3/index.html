<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="demo3.css" />
</head>

<body>
    <div class="main">
        <div class="main-wrp">
            <!-- <div class="welcome">
                <p><b>Welcome Users</b></p>
            </div> -->
            <div class="login">
                <form id="form" action="#" onsubmit="validate();return false">
                    <h2>Login Form</h2>
                    <div class="lable-wrp">
                        <input type="text" id="Email" placeholder="Email" autocomplete="off" />
                        <!-- <label for="email">Email</label> -->
                        <p id="p_email"></p>
                    </div>
                    <div class="lable-wrp">
                        <input type="text" id="Contact" placeholder="contact" autocomplete="off" />
                        <!-- <label for="contact">Contact</label> -->
                        <p id="p_contact"></p>
                    </div>
                    <div class="lable-wrp">
                        <input type="password" id="Password" placeholder="password" autocomplete="off" />
                        <!-- <label for="password">Password</label> -->
                        <p id="p_password"></p>
                    </div>
                    <div class="btn">
                        <button><b>Login</b></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="validation.js"></script>
</body>

</html>
